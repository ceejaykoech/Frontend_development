<!DOCTYPE html>
<html>
<head>
<title>Flexbox Profile Page</title>
<style>
    body{
        font-family: Arial;
        background-color: lightblue;
        margin: 20px;

    }
    .profile-text{
        width:50%;
    }
    .profile-text p{
        width: 50%;
    }
    .profile-text h1{
        color: darkblue;
    }
    .profile-text p{
        font-size: 18px;
        color: darkgreen;
    }
    .profile-image img{
        border: 4px solid black;
        border-radius: 15px;
        width: 200px;

    }
    .hobbies{
        margin-top: 30px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid grey;

    }
    .hobbies h2{
        color: darkred;


    }
    .hobbies ul{
       padding-left: 20px;
    }


    .hobbies li{
        margin-bottom: 10px;
        font-size: 18px;
    }
    .link-section{
        margin-top: 30px;
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid grey;


    }
    .link-section a{
        color:blue;
        font-size: 18px;
        text-decoration: none;
    }
    </style>
    </head>
    <body>
        <div class="container">
        <div class="profile">
            <h1>Ceejay Koech</h1>
             <p>
                Hello!My name is Claudin Cherono.
                I am learning frontend development using HTML and CSS.

             </p>
             <P>
                I enjoy cooking,dancing and learning new technology skills.
             </P>
             </div>
             <div class="profile-image"
             <img
             src="https://via,placerholder.com/200"
             alt="Profile Photo"
             >
             </div>
            </div>
            <div class="link-section">
                <h2>My Favourite Website</h2>
                <p>
                    visit
                    <a href="https://www.youtube.com">
                        Youtube
                    </a>
                </p>
                </div>

    </body>
    </html>

</html>
