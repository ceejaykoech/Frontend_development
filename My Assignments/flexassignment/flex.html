<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary</title>
    <link rel="stylesheet" href="flex.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="result">
        <h3>Your Result</h3>

        <div class="circle">
            <h1>76</h1>
            <p>of 100</p>
        </div>

        <h2>Great</h2>
        <p class="text">
            You scored higher than 65% of the people who have taken these tests.
        </p>
    </div>

    <!-- Right Side -->
    <div class="summary">
        <h3>Summary</h3>

        <div class="item reaction">
            <span>Reaction</span>
            <strong>80 / 100</strong>
        </div>

        <div class="item memory">
            <span>Memory</span>
            <strong>92 / 100</strong>
        </div>

        <div class="item verbal">
            <span>Verbal</span>
            <strong>61 / 100</strong>
        </div>

        <div class="item visual">
            <span>Visual</span>
            <strong>73 / 100</strong>
        </div>

        <button>Continue</button>
    </div>

</div>

</body>
</html>
