<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition and Animation</title>
    <style>
        /*transition*/
        .box{
            width: 100px;
            height: 100px;
            background-color: red;
            transition: all 1s ease;
        }
        .box:hover{
            width: 200px;
            height: 200px;
            background-color: blue;
        }
        /*animation*/
        .circle{
            width: 100px;
            height: 100px;
            background-color: green;
            border-radius: 50%;
            animation: bounce 5s;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }BN/ 
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }

    </style>
</head>
<body>
    <h2>CSS Transitions and Animations</h2>
    <div class="box"></div>
    <div class="circle"></div>

    
</body>


</body>
</html>
